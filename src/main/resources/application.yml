server:
  port: 8086

spring:
  application:
    name: auth-service
  data:
    redis:
      host: redis-12122.crce286.ap-south-1-1.ec2.cloud.redislabs.com
      port: 12122
      database: 0
      username: default
      password: r6SzbNN64Osft3OHXhgyRQybe6Ud3JE6
      ssl:
        enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

kite:
  api-key: 7ye4tih0hyb1g3zx
  api-secret: mnmcdwf85fehrp48y9otfvg6ztw7iy6s
  redirect-url: http://localhost:8086/kite/callback
  ws-max-retries: 50
  ws-max-retry-interval-seconds: 60

app:
  cors:
    allowed-origins: http://localhost:5173
  token:
    expire:
      zone: Asia/Kolkata
      hour: 23
      minute: 59
      second: 59

ticks:
  default-mode: full
  dispatcher-workers: 2
  token-cache-seconds: 5
  retry-initial-delay-ms: 1000
  retry-max-delay-ms: 30000
  log-sample-interval-ms: 2000

session:
  candles:
    zone-id: Asia/Kolkata
    market-open: "09:15"
    market-close: "15:30"
    live-alignment-enabled: true
  stress:
    enabled: false
    poll-interval-ms: 5000

bootstrap:
  buffer:
    peak-tps: 200
    max-seed-latency-sec: 20
    safety-factor: 3
    store: memory
    redis:
      key-prefix: bootstrap:tickbuf
    guard:
      max-pending-ticks-total: 10000000
  v2:
    enabled: false
    scope: all
  scheduler:
    requests-per-second: 2
    burst-size: 1
    retry:
      initial-delay-ms: 500
      max-delay-ms: 30000
      jitter-ratio: 0.2

internal:
  port: 8087
  api-key: dev-internal-key-123

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true
    operations-sorter: alpha
    tags-sorter: alpha

trading:
  retention:
    order-ttl-seconds: 604800
    fill-ttl-seconds: 604800
    dedupe-ttl-seconds: 172800
  margin:
    mis-percent: 0.20
    nrml-percent: 0.40
    charge-bps: 2.0
  paper:
    slippage-bps: 2.0
    fee-bps: 1.5
    execution-cycle-enabled: true
    execution-cycle-fixed-delay-ms: 500
    pnl-epsilon: 0.01
    trigger-evaluation-fixed-delay-ms: 100
    eod-sweep-enabled: true
    eod-sweep-fixed-delay-ms: 15000
    eod-cutoff-time: "15:29:30"
  kite:
    base-url: https://api.kite.trade
    live-orders-enabled: false
  reconciliation:
    enabled: false
    fixed-delay-ms: 5000
  guardrails:
    max-open-orders-per-account: 300
    max-orders-per-minute: 180
  intent:
    dedupe-ttl-seconds: 86400

instruments-loader:
  exchanges:
    - NSE
  write-mode: direct
  prune-others: true
  batch-size: 5000

logging:
  level:
    root: INFO
